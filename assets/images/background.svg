<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 960">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFAF0"/>
      <stop offset="50%" stop-color="#FEF0DC"/>
      <stop offset="100%" stop-color="#F8DDAE"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="270" cy="420" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFF8" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomWarm" cx="270" cy="900" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD060" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFD060" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base warm gradient -->
  <rect width="540" height="960" fill="url(#bg)"/>
  <!-- Soft central glow -->
  <rect width="540" height="960" fill="url(#centerGlow)"/>
  <!-- Warm bottom glow -->
  <rect width="540" height="960" fill="url(#bottomWarm)"/>

  <!-- Outer border frame -->
  <rect x="20" y="20" width="500" height="920" rx="12" fill="none"
        stroke="#C8960C" stroke-width="1.8" opacity="0.4"/>
  <!-- Inner border frame -->
  <rect x="29" y="29" width="482" height="902" rx="8" fill="none"
        stroke="#C8960C" stroke-width="0.8" opacity="0.22"/>

  <!-- Corner ornaments -->
  <!-- Top-Left -->
  <g transform="translate(20,20)" stroke="#C8960C" fill="#C8960C" opacity="0.52">
    <circle cx="0" cy="0" r="5.5"/>
    <rect x="9" y="-0.8" width="44" height="1.6"/>
    <rect x="-0.8" y="9" width="1.6" height="44"/>
    <polygon points="0,-9 2.5,0 0,9 -2.5,0" transform="translate(58,0)" opacity="0.65"/>
    <polygon points="0,-9 2.5,0 0,9 -2.5,0" transform="translate(0,58)" opacity="0.65"/>
  </g>
  <!-- Top-Right -->
  <g transform="translate(520,20)" stroke="#C8960C" fill="#C8960C" opacity="0.52">
    <circle cx="0" cy="0" r="5.5"/>
    <rect x="-53" y="-0.8" width="44" height="1.6"/>
    <rect x="-0.8" y="9" width="1.6" height="44"/>
    <polygon points="0,-9 2.5,0 0,9 -2.5,0" transform="translate(-58,0)" opacity="0.65"/>
    <polygon points="0,-9 2.5,0 0,9 -2.5,0" transform="translate(0,58)" opacity="0.65"/>
  </g>
  <!-- Bottom-Left -->
  <g transform="translate(20,940)" stroke="#C8960C" fill="#C8960C" opacity="0.52">
    <circle cx="0" cy="0" r="5.5"/>
    <rect x="9" y="-0.8" width="44" height="1.6"/>
    <rect x="-0.8" y="-53" width="1.6" height="44"/>
    <polygon points="0,-9 2.5,0 0,9 -2.5,0" transform="translate(58,0)" opacity="0.65"/>
    <polygon points="0,-9 2.5,0 0,9 -2.5,0" transform="translate(0,-58)" opacity="0.65"/>
  </g>
  <!-- Bottom-Right -->
  <g transform="translate(520,940)" stroke="#C8960C" fill="#C8960C" opacity="0.52">
    <circle cx="0" cy="0" r="5.5"/>
    <rect x="-53" y="-0.8" width="44" height="1.6"/>
    <rect x="-0.8" y="-53" width="1.6" height="44"/>
    <polygon points="0,-9 2.5,0 0,9 -2.5,0" transform="translate(-58,0)" opacity="0.65"/>
    <polygon points="0,-9 2.5,0 0,9 -2.5,0" transform="translate(0,-58)" opacity="0.65"/>
  </g>

  <!-- 8-petal lotus - top center -->
  <g transform="translate(270,68)" fill="#C8960C" opacity="0.22">
    <ellipse cx="0" cy="-17" rx="7" ry="14"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(45)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(90)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(135)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(180)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(225)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(270)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(315)"/>
    <circle r="8"/>
  </g>

  <!-- 8-petal lotus - bottom center -->
  <g transform="translate(270,892)" fill="#C8960C" opacity="0.22">
    <ellipse cx="0" cy="-17" rx="7" ry="14"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(45)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(90)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(135)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(180)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(225)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(270)"/>
    <ellipse cx="0" cy="-17" rx="7" ry="14" transform="rotate(315)"/>
    <circle r="8"/>
  </g>

  <!-- 4-pointed sparkle stars scattered -->
  <g fill="#C8960C">
    <polygon points="85,138 87.5,130 90,138 98,138 91.5,143 94,151 87.5,146 81,151 83.5,143 77,138" opacity="0.28"/>
    <polygon points="450,195 452,188 454,195 461,195 455.5,200 457.5,207 452,203 446.5,207 448.5,200 443,195" opacity="0.26"/>
    <polygon points="108,390 110.5,382 113,390 121,390 114.5,395 117,403 110.5,398 104,403 106.5,395 100,390" opacity="0.27"/>
    <polygon points="430,460 432,453 434,460 441,460 435.5,465 437.5,472 432,468 426.5,472 428.5,465 423,460" opacity="0.25"/>
    <polygon points="58,590 60.5,582 63,590 71,590 64.5,595 67,603 60.5,598 54,603 56.5,595 50,590" opacity="0.26"/>
    <polygon points="476,635 478.5,628 481,635 488,635 482.5,640 484.5,647 478.5,643 472.5,647 474.5,640 469,635" opacity="0.27"/>
    <polygon points="88,800 91,791 94,800 103,800 96.5,805.5 99,814.5 91,809 83,814.5 85.5,805.5 79,800" opacity="0.25"/>
    <polygon points="452,835 454.5,827 457,835 465,835 458.5,840 461,848 454.5,843 448,848 450.5,840 444,835" opacity="0.24"/>
    <polygon points="270,88 273,79 276,88 285,88 278,94 281,103 273,98 265,103 268,94 261,88" opacity="0.22"/>
    <polygon points="175,875 178,866 181,875 190,875 183.5,880.5 186,889.5 178,884 170,889.5 172.5,880.5 166,875" opacity="0.26"/>
    <polygon points="392,895 394.5,887 397,895 405,895 398.5,900 401,908 394.5,903 388,908 390.5,900 384,895" opacity="0.25"/>
    <!-- Mid-size stars -->
    <polygon points="460,100 464,88 468,100 480,100 471,107 474,119 464,112 454,119 457,107 448,100" opacity="0.2"/>
    <polygon points="55,355 59,344 63,355 75,355 66,362 69,373 59,367 49,373 52,362 43,355" opacity="0.2"/>
    <polygon points="490,498 494,488 498,498 510,498 501,505 504,516 494,510 484,516 487,505 478,498" opacity="0.19"/>
    <polygon points="38,715 42,704 46,715 58,715 49,722 52,733 42,727 32,733 35,722 26,715" opacity="0.19"/>
  </g>

  <!-- Subtle ambient glow circles -->
  <circle cx="75" cy="290" r="55" fill="#FFD070" opacity="0.055"/>
  <circle cx="465" cy="380" r="65" fill="#FFD070" opacity="0.05"/>
  <circle cx="85" cy="760" r="60" fill="#FFD070" opacity="0.05"/>
  <circle cx="455" cy="700" r="50" fill="#FFD070" opacity="0.055"/>

  <!-- Subtle horizontal accent lines -->
  <line x1="68" y1="310" x2="472" y2="310" stroke="#C8960C" stroke-width="0.5" opacity="0.16"/>
  <line x1="68" y1="650" x2="472" y2="650" stroke="#C8960C" stroke-width="0.5" opacity="0.16"/>
  <!-- Diamond accents on lines -->
  <polygon points="270,303 275,310 270,317 265,310" fill="#C8960C" opacity="0.28"/>
  <polygon points="270,643 275,650 270,657 265,650" fill="#C8960C" opacity="0.28"/>
</svg>
